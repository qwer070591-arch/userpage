<!DOCTYPE html>
<html lang="ZH-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人首頁</title>
    <link rel="stylesheet" href="css/all.min.css">

    <style>
        :root {
            --banner-bg: #0f172a;
            --banner-text: #f8fafc;

            --page-bg: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;

            --card-bg: #ffffff;
            --card-border: #e2e8f0;

            --cta-bg: #3b82f6;
            --cta-text: #ffffff;
            --cta-hover: #2563eb;

            --accent: #60a5fa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
        }

        /* ===== HERO ===== */
        .s01 {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 60px 20px;
            overflow: hidden;

            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }

        /* 柔化裝飾方塊 */
        .s01 .box01,
        .s01 .box02,
        .s01 .box03,
        .s01 .box04 {
            width: 180px;
            height: 180px;
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .s01 .box01 {
            top: -40px;
            left: -40px;
        }

        .s01 .box02 {
            top: -40px;
            right: -40px;
        }

        .s01 .box03 {
            bottom: -40px;
            left: -40px;
        }

        .s01 .box04 {
            bottom: -40px;
            right: -40px;
        }

        /* 圖片主體 */
        .s01 .userImg {
            position: absolute;
            top: 90px;
            left: 90px;
            right: 90px;
            bottom: 90px;

            background-image: url(images/cat03.avif);
            background-size: cover;
            background-position: center;

            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            filter: brightness(0.9);

            z-index: 2;
        }

        /* 遮罩讓文字更清楚 */
        .s01 .userImg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.1));
            border-radius: 20px;
        }

        /* 文字區 */
        .userText {
            position: absolute;
            top: 18%;
            left: 10%;
            max-width: 520px;
            z-index: 3;
            color: var(--banner-text);
        }

        .userText h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .userText h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        .userText p {
            font-size: 1.05rem;
            color: #e2e8f0;
            line-height: 1.6;
        }

        hr {
            border: none;
            height: 2px;
            width: 60px;
            background: var(--accent);
            margin: 15px 0;
        }

        /* ===== WORKS ===== */
        .s02 {
            padding: 90px 10%;
            text-align: center;
        }

        .s02 h2 {
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--text-main);
        }

        .s02 .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .s02 .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 28px;
            text-align: left;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: 0.3s ease;
        }

        .s02 .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
        }

        .s02 .card h3 {
            margin-top: 0;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .s02 .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .s02 .card a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            background: var(--cta-bg);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .s02 .card a:hover {
            background: var(--cta-hover);
        }

        /* ===== RWD ===== */
        @media (max-width: 992px) {
            .s01 {
                flex-direction: column;
                text-align: center;
            }

            .s01 .userImg {
                position: relative;
                inset: auto;
                width: 100%;
                height: 320px;
                margin-bottom: 30px;
            }

            .userText {
                position: relative;
                left: auto;
                top: auto;
                text-align: center;
                color: white;
            }

            .s01 .box01,
            .s01 .box02,
            .s01 .box03,
            .s01 .box04 {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .userText h1 {
                font-size: 2.2rem;
            }

            .s02 {
                padding: 60px 5%;
            }
        }

        /* ===== 滾動動畫（Fade In）===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 讓 hero 文字也有動畫 */
        .userText {
            animation: heroFade 1s ease forwards;
            opacity: 0;
        }

        @keyframes heroFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片延遲效果（更有層次） */
        .s02 .card:nth-child(1) {
            transition-delay: 0.1s;
        }

        .s02 .card:nth-child(2) {
            transition-delay: 0.2s;
        }

        .s02 .card:nth-child(3) {
            transition-delay: 0.3s;
        }

        .s02 .card:nth-child(4) {
            transition-delay: 0.4s;
        }
    </style>
</head>

<body>

    <section class="s01">
        <div class="box01"></div>
        <div class="box02"></div>
        <div class="box03"></div>
        <div class="box04"></div>

        <div class="userImg"></div>

        <div class="userText">
            <h1>xxx履歷</h1>
            <hr>
            <h2>應徵職位:軟體工程師</h2>
            <p>座右銘："學習永無止盡，挑戰自我不斷成長。"</p>
        </div>
    </section>

    <section class="s02">
        <h2>我的作品</h2>

        <div class="container">
            <div class="card">
                <h3>切版練習</h3>
                <p>使用HTML，CSS練習切版。</p>
                <a href="20260605-ch5ai.html">查看作品</a>
            </div>

            <div class="card">
                <h3>個人網站</h3>
                <p>20260605</p>
                <a href="20260605ai.html">查看作品</a>
            </div>

            <div class="card">
                <h3>表單練習</h3>
                <p>20260625</p>
                <a href="20260625-ch11-JS.ai.html">查看作品</a>
            </div>

            <div class="card">
                <h3>時間軸排版練習</h3>
                <p>20260623。</p>
                <a href="20260623-ch7 timeline ai.html">查看作品</a>
            </div>
        </div>
    </section>
    <script>
        const items = document.querySelectorAll('.card');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, {
            threshold: 0.15
        });

        // 套用在卡片 + 你想要動畫的區塊
        items.forEach(item => {
            item.classList.add('reveal');
            observer.observe(item);
        });
    </script>
</body>

</html>
